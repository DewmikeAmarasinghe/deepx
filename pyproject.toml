[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deepx"
dynamic = ["version"]
requires-python = ">=3.11"
dependencies = [
    "openai-agents>=0.0.19",
    "pydantic>=2.0",
    "aiosqlite>=0.19",
    "pyyaml>=6.0",
    "langsmith>=0.1.0",
    "httpx>=0.27",
    "pypdf>=5.0",
    "pdfplumber>=0.11",
]

dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff",
    "pyright",
    "httpx>=0.27",
    "python-dotenv>=1.0",
]

[tool.hatch.version]
path = "src/deepx/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/deepx"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.uv.workspace]
members = [
    "a",
]